<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon | Publications</title>
    <style>
        /* 定义你的专属调色板 */
        :root {
            --bg-color: #1a1a1b;     /* 深炭灰背景 */
            --gold-accent: #c5a059;  /* 哑光青铜金 */
            --white-text: #e0e0e0;   /* 柔和骨白 */
			--steel-blue: #5c6bc0;   /* 蓝紫色 */
			--chicago-red: #800000;  /* 芝加哥红 */
            --sidebar-border: #333334;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        /* 顶部导航：Title + 5 Labels */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            border-bottom: 1px solid var(--gold-accent);
            background-color: rgba(26, 26, 27, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
		
		.logo-title-wrapper {
		    display: flex;
			align-items: center;
			gap: 15px;
		}

        .site-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold-accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
			margin-left: 10px;
        }
		
		.site-logo {
		    height: 32px;
			width: auto;
			display: block;
		}

        nav a {
            color: var(--white-text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        nav a:hover {
            color: var(--gold-accent);
            text-shadow: 0 0 8px rgba(197, 160, 89, 0.4);
        }

        /* 主容器布局 */
        .container {
            display: flex;
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 40px;
        }

        /* 左侧窄侧栏：社交软件 */
        .sidebar {
            flex: 0 0 160px;
            padding-right: 40px;
            border-right: 1px solid var(--sidebar-border);
        }

        .sidebar h3 {
            font-size: 12px;
            color: var(--gold-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { margin-bottom: 18px; }
        
        .sidebar a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .sidebar a:hover { color: var(--gold-accent); }

        /* 右侧主栏：简历内容 */
        .main-content {
            flex: 1;
            padding-left: 60px;
        }

        h2 {
            color: var(--gold-accent);
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--sidebar-border);
            margin-left: 20px;
        }

        .cv-section { 
		margin-top: 20px; 
		margin-bottom: 20px; 
		}
