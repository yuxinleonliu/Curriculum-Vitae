<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo | Academic & Collections</title>
    <style>
        /* 全局基础设置：卡拉瓦乔深色调 */
        body {
            background-color: #0d0d0d;
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 顶部导航栏：Title 在左，Labels 在右 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #1a1a1a;
            border-bottom: 2px solid #d4af37; /* 黄金色底边 */
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover { color: #d4af37; }

        /* 主体布局：左侧边栏 + 右侧简历 */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 左侧窄侧栏：社交软件 */
        .sidebar {
            flex: 0 0 180px; /* 固定宽度 */
            padding-right: 30px;
            border-right: 1px solid #333;
        }

        .sidebar h3 { font-size: 16px; color: #888; text-transform: uppercase; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin-bottom: 15px; }
        .sidebar a { color: #03dac6; text-decoration: none; font-size: 14px; }
        .sidebar a:hover { border-bottom: 1px solid #03dac6; }

        /* 右侧主栏：简历内容 */
        .main-content {
            flex: 1;
            padding-left: 50px;
        }

        .main-content h2 { color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .cv-section { margin-bottom: 30px; }
        .cv-item { margin
